<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Mockup - Perfect Visibility</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --brand-purple: #8b5cf6;
            --brand-blue: #3b82f6;
            --brand-cyan: #06b6d4;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 60%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Abstract Grid */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 60px 60px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            z-index: 1;
            mask-image: radial-gradient(circle at center, black 60%, transparent 95%);
            -webkit-mask-image: radial-gradient(circle at center, black 60%, transparent 95%);
        }

        /* Central Layout Container */
        .container {
            position: relative;
            z-index: 10;
            width: 1600px;
            height: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Left Side: Copywriting */
        .copy {
            flex: 0 0 500px;
            z-index: 100;
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 100px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .badge-pill span {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: #e4e4e7;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 12px #22c55e;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 72px;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 20px 0;
            color: #fff;
            letter-spacing: -2px;
        }

        h1 span {
            display: block;
            background: linear-gradient(135deg, #a855f7, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 22px;
            line-height: 1.6;
            color: #a1a1aa;
            margin: 0;
            font-weight: 400;
        }

        /* Floating Cards */
        .feature-cards {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .card h3 {
            font-family: 'Outfit', sans-serif;
            margin: 0 0 8px 0;
            color: #fff;
            font-size: 18px;
        }

        .card p {
            margin: 0;
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Right Side: Flat Mockups (Perfectly Visible) */
        .mockups {
            position: relative;
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        /* Large Ambient Glow directly behind devices */
        .device-glow {
            position: absolute;
            top: 50%;
            right: 200px;
            transform: translateY(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4) 0%, rgba(59, 130, 246, 0.2) 60%, transparent 80%);
            filter: blur(60px);
            border-radius: 50%;
            z-index: 0;
        }

        /* Desktop (Flat, Large, Beautifully scaled) */
        .desktop {
            position: absolute;
            right: 120px;
            /* Flush right */
            width: 1000px;
            height: 620px;
            background: #18181b;
            border-radius: 16px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 120px rgba(0, 0, 0, 0.4);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .mac-titlebar {
            height: 40px;
            background: #27272a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mac-dots {
            display: flex;
            gap: 8px;
        }

        .mac-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .mac-dot.c {
            background: #ff5f56;
        }

        .mac-dot.m {
            background: #ffbd2e;
        }

        .mac-dot.x {
            background: #27c93f;
        }

        .desktop-screen {
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        .desktop-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        /* Mobile (Flat, Overlapping) */
        .mobile {
            position: absolute;
            right: 0px;
            /* Extending past the laptop slightly */
            bottom: 40px;
            /* Offset to overlap the corner */
            width: 300px;
            height: 620px;
            background: #000;
            border-radius: 44px;
            padding: 10px;
            box-shadow:
                -20px 20px 60px rgba(0, 0, 0, 0.8),
                0 0 0 2px rgba(255, 255, 255, 0.1),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            z-index: 20;
            display: flex;
            justify-content: center;
        }

        .mobile-notch {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 24px;
            background: #000;
            border-radius: 20px;
            z-index: 30;
        }

        .mobile-screen {
            width: 100%;
            height: 100%;
            border-radius: 34px;
            overflow: hidden;
            background: #111;
        }

        .mobile-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <div class="container">

        <!-- Left Side: Copy -->
        <div class="copy">
            <div class="badge-pill">
                <div class="badge-dot"></div>
                <span>v0.1.0 Architecture</span>
            </div>

            <h1>Digital School <span>Management</span></h1>

            <p class="subtitle">An ultra-high-performance, AI-integrated school management system built for maximum
                velocity and modern scale.</p>

            <div class="feature-cards">
                <div class="card">
                    <div class="card-icon">🧠</div>
                    <h3>AI Generation</h3>
                    <p>Automated question banks and instant exam grading.</p>
                </div>
                <div class="card">
                    <div class="card-icon">⚡</div>
                    <h3>0ms Latency</h3>
                    <p>Aggressive edge caching and SWR architecture.</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Flat Perfectly Visible Mockups -->
        <div class="mockups">
            <div class="device-glow"></div>

            <div class="desktop">
                <div class="mac-titlebar">
                    <div class="mac-dots">
                        <div class="mac-dot c"></div>
                        <div class="mac-dot m"></div>
                        <div class="mac-dot x"></div>
                    </div>
                </div>
                <div class="desktop-screen">
                    <img src="../public/desktop-screenshot.png" alt="Desktop UI">
                </div>
            </div>

            <div class="mobile">
                <div class="mobile-notch"></div>
                <div class="mobile-screen">
                    <img src="../public/mobile-screenshot.png" alt="Mobile UI">
                </div>
            </div>
        </div>

    </div>
</body>

</html>
